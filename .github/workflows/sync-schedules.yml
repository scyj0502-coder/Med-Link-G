name: Sync schedules

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Hospital id or adapter to sync"
        required: false
        type: choice
        default: all
        options:
          - all
          - kmugh
          - edah_pdf
          - edah-main
          - edah-cancer
          - edah-dachang
          - shinkao
          - pingtung-mohw
          - cgmh-datong
          - ptvgh
  schedule:
    # Taiwan time: Monday 08:00.
    - cron: "0 0 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"
      - name: Install OCR runtime
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-tra
      - name: Restore OCR cache
        uses: actions/cache@v4
        with:
          path: scraper/data/ocr-cache
          key: ocr-cache-${{ runner.os }}-${{ hashFiles('scraper/config.yaml') }}
          restore-keys: |
            ocr-cache-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run parser tests
        run: python -m unittest discover tests
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MAINTAINER_CHAT_ID: ${{ secrets.TELEGRAM_MAINTAINER_CHAT_ID }}
        run: |
          set -o pipefail
          target="${{ github.event.inputs.target }}"
          if [ "$target" = "all" ]; then
            target=""
          fi
          python main.py "$target" 2>&1 | tee sync-output.log
      - name: Add sync summary
        if: always()
        env:
          SYNC_TARGET: ${{ github.event.inputs.target }}
        run: |
          {
            echo "## Med-Link schedule sync"
            echo
            echo "- Run time (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Target: ${SYNC_TARGET:-all enabled sources}"
            echo
            if [ -f sync-summary.md ]; then
              cat sync-summary.md
              echo
            fi
            echo '```text'
            if [ -f sync-output.log ]; then
              tail -n 80 sync-output.log
            else
              echo "No sync output file generated."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: med-link-sync-report
          path: |
            scraper/sync-summary.json
            scraper/sync-summary.md
            scraper/sync-output.log
          if-no-files-found: ignore
