name: Sync schedules

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Optional hospital id or adapter, e.g. kmugh"
        required: false
        default: ""
  schedule:
    # Taiwan time: Monday 08:00.
    - cron: "0 0 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"
      - name: Install OCR runtime
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-tra
      - name: Restore OCR cache
        uses: actions/cache@v4
        with:
          path: scraper/data/ocr-cache
          key: ocr-cache-${{ runner.os }}-${{ hashFiles('scraper/config.yaml') }}
          restore-keys: |
            ocr-cache-${{ runner.os }}-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run parser tests
        run: python -m unittest discover tests
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MAINTAINER_CHAT_ID: ${{ secrets.TELEGRAM_MAINTAINER_CHAT_ID }}
        run: python main.py ${{ github.event.inputs.target }}
