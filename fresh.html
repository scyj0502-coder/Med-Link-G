<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>更新醫點通</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7f4;
        color: #17211f;
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #d9e2de;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 48px rgba(21, 42, 40, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 26px;
      }

      p {
        margin: 0;
        color: #67736f;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在更新醫點通</h1>
      <p>正在清除舊版離線快取，完成後會自動回到新版首頁。</p>
    </main>
    <script>
      async function refreshApp() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        location.replace("./?v=20260511i");
      }

      refreshApp();
    </script>
  </body>
</html>
